<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Yok 💙</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  overflow:hidden;
  background:#e6f5ff;
}

/* 🔒 Lock Screen */
#lockScreen{
  position:fixed;
  inset:0;
  background:linear-gradient(#dff4ff,#cdeeff);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.lock-box{
  text-align:center;
}

.lock-box input{
  padding:12px;
  border-radius:10px;
  border:none;
  font-size:18px;
}

.lock-box button{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#7ec8ff;
  color:white;
  cursor:pointer;
}

/* 🌌 Background */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

.bg img{
  width:100%;
  height:100%;
  object-fit:cover;
  position:absolute;
  opacity:0;
  animation:fade 20s infinite;
  filter:brightness(0.8);
}

@keyframes fade{
  0%{opacity:0;}
  10%{opacity:1;}
  30%{opacity:1;}
  40%{opacity:0;}
  100%{opacity:0;}
}

/* 💙 Content */
.container{
  text-align:center;
  margin-top:20%;
  color:#4a90e2;
}

/* 💖 Button */
button{
  padding:15px 25px;
  border:none;
  border-radius:20px;
  background:#7ec8ff;
  color:white;
  font-size:18px;
  cursor:pointer;
}

/* 💕 Hearts */
.heart{
  position:absolute;
  animation:float 5s linear infinite;
}

@keyframes float{
  0%{transform:translateY(100vh);}
  100%{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<!-- 🔒 Lock Screen -->
<div id="lockScreen">
  <div class="lock-box">
    <h2>ใส่รหัสก่อนเข้า 💙</h2>
    <input type="password" id="pass" placeholder="รหัส...">
    <br>
    <button onclick="checkPass()">เข้าเว็บ</button>
  </div>
</div>

<!-- 🌌 Background -->
<div class="bg">
  <img src="img1.jpg" style="animation-delay:0s">
  <img src="img2.jpg" style="animation-delay:5s">
  <img src="img3.jpg" style="animation-delay:10s">
  <img src="img4.jpg" style="animation-delay:15s">
</div>

<div class="container">
  <h1 id="typing"></h1>
  <p>ครบรอบ 2 ปีแล้วนะ 💙</p>

  <button onclick="show()">กดดูเซอร์ไพรส์ 🎁</button>

  <div id="secret" style="display:none; margin-top:20px;">
    <h2>รักเธอที่สุดเลย 💖</h2>
    <video width="300" controls>
      <source src="video.mp4">
    </video>
  </div>
</div>

<!-- 🎵 เพลง -->
<audio id="bgm" loop>
  <source src="music.mp3">
</audio>

<script>
// 🔒 password
function checkPass(){
  const pass = document.getElementById("pass").value;
  if(pass === "210467"){
    document.getElementById("lockScreen").style.display="none";
    document.getElementById("bgm").play();
    typeEffect();
  }else{
    alert("รหัสไม่ถูกนะ 😝");
  }
}

// 💌 typing
const text = "ถึงหยก เค้ารักเธอมากๆนะ 💙";
let i=0;
function typeEffect(){
  if(i<text.length){
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect,60);
  }
}

// 🎁 show surprise
function show(){
  document.getElementById("secret").style.display="block";
}

// 💖 floating hearts
setInterval(()=>{
  let heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="💖";
  heart.style.left=Math.random()*100+"vw";
  heart.style.fontSize=Math.random()*20+20+"px";
  document.body.appendChild(heart);

  setTimeout(()=>{heart.remove();},5000);
},300);
</script>

</body>
</html>
